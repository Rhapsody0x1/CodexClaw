commands:
  help:
    header: "# Command Guide"
    section_basic: "## Basic Commands"
    section_advanced: "## Advanced Commands"
    entry_help: "- 💡 `/help` - show this help"
    entry_status: "- 📌 `/status` - show session status"
    entry_sessions: "- 🗂️ `/sessions` - list projects and sessions"
    entry_import: "- 📥 `/import` - import native Codex sessions"
    entry_resume: "- ♻️ `/resume` - resume a saved session"
    entry_loadbg: "- 📚 `/loadbg` - load a session into the background"
    entry_bg: "- 🌙 `/bg` - send foreground to background"
    entry_fg: "- ☀️ `/fg` - bring a background session to the front"
    entry_rename: "- 🏷️ `/rename` - rename a background alias"
    entry_save: "- 💾 `/save` - keep the current session"
    entry_new: "- ✨ `/new` - start a new session"
    entry_stop: "- 🛑 `/stop` - end the current session"
    entry_interrupt: "- ⏹️ `/interrupt` - interrupt the running task"
    entry_self_update: "- 🚀 `/self-update` - deploy the latest build"
    entry_model: "- 🤖 `/model` - choose a model"
    entry_fast: "- ⚡ `/fast` - toggle fast mode"
    entry_context: "- 🧠 `/context` - choose context window"
    entry_reasoning: "- 🔍 `/reasoning` - choose reasoning depth"
    entry_verbose: "- 🪄 `/verbose` - toggle verbose output"
    entry_alias: "- 🧩 `/alias` - manage command aliases"
    entry_lang: "- 🌐 `/lang` - switch UI language"

  runtime:
    last_user_message: "last user message: %{preview}"
    model: "model: %{summary}"

  new:
    created_temp: "Created a new temporary foreground session."
    created_with_workspace: "Created a new temporary foreground session.\nworkdir: `%{dir}`"
    parked: "Previous foreground moved to background alias: `%{alias}`"

  stop:
    ended_restored: "%{prefix} Auto-switched to most recent background alias `%{alias}`."
    ended_new_temp: "Previous foreground ended. New temporary foreground session created."
    had_none_restored: "No active foreground to stop. Auto-switched to background alias `%{alias}`."
    had_none_reset: "No active foreground to stop. Reset to new temporary session."
    ended_saved: "Foreground session ended and kept."
    ended_dropped: "Foreground session ended and dropped (unsaved)."
    ended_plain: "Foreground session ended."
    ended_saved_new: "Foreground session ended and kept. New temporary foreground session created."
    ended_dropped_new: "Foreground session ended and dropped (unsaved). New temporary foreground session created."
    ended_plain_new: "Foreground session ended. New temporary foreground session created."

  sessions:
    empty: "No sessions. Start a conversation then use `/save` or `/bg` to keep one."
    project_header: "Projects (total=%{count}):"
    project_row: "%{index}. %{path} | sessions=%{sessions} | latest=%{latest}"
    projects_footer: "Type a project number (e.g. `1`) to drill in, or `/back` to exit."
    project_empty: "Project `%{path}` has no sessions."
    page_out_of_range: "Page out of range: project `%{path}` has %{total} sessions, page size %{size}, current page %{page}."
    page_header: "Project sessions project=%{path} page=%{page}/%{total_pages} (total=%{total})"
    row: "%{index}. %{updated} | %{summary}"
    page_footer: "Use `/resume` or `/loadbg` to act on a session. `/back` to exit."
    no_summary: "(no summary)"
    scope_invalid: "only the `all` scope is supported"
    project_selector_empty: "project selector cannot be empty"
    project_not_found: "project not found: %{selector} (run `/sessions` first)"
    project_ambiguous: "project prefix is ambiguous; use the full path or numeric index"
    session_not_found: "session not found: %{selector}"
    session_ambiguous: "session prefix is ambiguous; use the full session ID"

  status:
    workspace: "workdir: %{dir}"
    model: "model: %{summary}"
    verbose_on: "verbose: on"
    verbose_off: "verbose: off"
    bg_header: "background sessions (%{count}):"
    bg_none: "background sessions: none"
    fg_busy: "foreground: running"
    fg_idle: "foreground: idle"
    context_usage: "context window: %{percent}% left (%{used} used / %{total})"
    context_unknown: "context window: — (no usage data yet)"
    lang: "language: %{lang}"

  model:
    updated: "model updated to: %{model}"
    status: "model: %{effective}    override: %{override_value}"
    invalid: "invalid model name"
    prompt_current: "Current model: %{current}"
    prompt_header: "Available models:"
    prompt_item: "  • %{name}"

  fast:
    updated: "fast mode updated to: %{value}"
    status: "fast: %{value}"
    invalid: "invalid value. Try: on | off | inherit"
    prompt_current: "Current fast mode: %{current}"
    prompt_header: "Options: on / off / inherit"

  context:
    updated: "context mode updated to: %{value}"
    status: "context: %{value}"
    invalid: "invalid value. Try: 1m | standard | inherit"
    prompt_current: "Current context: %{current}"
    prompt_header: "Options: standard / 1m / inherit"

  reasoning:
    updated: "reasoning depth updated to: %{value}"
    status: "reasoning: %{value}"
    invalid: "invalid depth. choices: none | minimal | low | medium | high | xhigh | inherit"
    prompt_current: "Current reasoning: %{current}"
    prompt_header: "Options: none / minimal / low / medium / high / xhigh / inherit"

  shared:
    inherit_default: "inherit default"
    unknown: "unknown"

  verbose:
    updated_on: "verbose output enabled"
    updated_off: "verbose output disabled"
    status_on: "verbose: on"
    status_off: "verbose: off"
    invalid: "invalid value. Try: on | off"
    prompt_current: "Current verbose: %{current}"
    prompt_header: "Options: on / off"

  alias:
    added: "alias `/%{name}` registered with %{count} steps"
    removed: "alias `/%{name}` removed"
    not_found: "alias `/%{name}` not found"
    list_header: "Registered aliases:"
    list_item: "  /%{name} → %{steps}"
    empty: "No aliases registered. Create one with:\n/alias add <name> <cmd1> | <cmd2> | ..."
    protected: "cannot use `/%{name}` — it collides with a built-in command"
    invalid_name: "invalid alias name. Rules: 1-20 chars, no `|`, not starting with `/`"
    empty_steps: "at least one sub-command is required"
    too_deep: "alias expansion too deep (limit: %{max})"
    usage: "usage: /alias add <name> <cmd1> | <cmd2> | ... | /alias list | /alias remove <name>"
    executed_header: "alias `/%{name}` executed:"
    skipped_non_command: "• %{step} (skipped: not a command)"

  bg:
    moved: "Foreground moved to background: `%{alias}`."
    reset_empty: "The foreground was an empty temporary session, so it was reset to a new temporary session."
    usage: "usage: `/bg <alias>`"

  fg:
    usage: "usage: `/fg <alias>`"
    parked: "Previous foreground moved to background: `%{alias}`.\n"
    switched: "%{parked}Switched to background session `%{alias}`.\n%{runtime}"
    prompt_header: "Background sessions:"
    prompt_item: "  • `%{alias}`"
    prompt_empty: "No background sessions."

  resume:
    usage: "usage: `/resume <index|session-id>`"
    parked: "Previous foreground moved to background: `%{alias}`.\n"
    restored: "%{parked}Resumed session: %{summary} (workspace: `%{workspace}`).\n%{runtime}"

  loadbg:
    usage: "usage: `/loadbg <index|session-id> [alias]`"
    loaded: "Loaded session into background alias `%{alias}`: %{summary}."

  save:
    updated: "Foreground session marked as saved."
    already_saved: "Foreground session is already saved."

  rename:
    usage: "usage: `/rename <old_alias> <new_alias>`"
    renamed: "Background alias renamed: `%{old}` -> `%{new}`"

  import:
    imported: "Session imported"
    refreshed: "Session already exists; import profile refreshed"
    result: "%{action}: %{summary}\nworkdir: `%{workspace}`\nmodel: %{model}"
    empty: "No importable sessions were found in `~/.codex/sessions`."
    project_header: "Importable projects (total=%{count})"
    project_row: "%{index}. %{path} | sessions=%{sessions} | latest=%{latest}"
    projects_footer: "Type a project number to drill in, or `/back` to exit."
    project_empty: "Project `%{path}` has no importable sessions."
    page_out_of_range: "Page out of range: project `%{path}` has %{total} sessions, page size %{size}, current page %{page}."
    page_header: "Importable sessions project=%{path} page=%{page}/%{total_pages} (total=%{total})"
    row: "%{index}. [%{updated}] %{summary}"
    page_footer: "Type a session number to import, or `/back` to exit."

  lang:
    updated: "language updated to: %{lang}"
    status: "current language: %{lang}"
    unsupported: "unsupported language `%{lang}`. Supported: en, zh"
    prompt_current: "Current language: %{current}"
    prompt_header: "Options: en / zh"

  interactive:
    hint: "Type a value (fuzzy match ok), or `/back` to cancel."
    ambiguous: "`%{input}` matched multiple: %{matches}. Please be more specific."
    no_match: "`%{input}` didn't match anything. Try again or `/back`."
    applied: "Applied to %{cmd}: %{value}."

  back:
    exited: "Exited `%{cmd}` setting."
    idle: "Not currently in an interactive setting."

errors:
  busy: "A task is already running. Please wait or use /interrupt first."
  permission: "Codex execution failed: Operation not permitted. Please check filesystem permissions."
  generic: "Command failed: %{message}"
  interrupt_requested: "Interrupt requested for current task."

warnings:
  context_near_limit: "⚠️ Context window is %{percent}% used (%{used} used / %{total}). Consider `/new` to start a fresh session."
