name: "\U0001F41B Bug 报告 / Bug Report"
description: 报告一个可复现的问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 报告！请尽量完整地填写以下信息，这有助于快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Description
      description: 清楚描述你遇到的问题，包括实际行为和期望行为
      placeholder: |
        **实际行为：** 发送消息后 CodexClaw 没有回复，日志显示 ...
        **期望行为：** CodexClaw 应正常调用 Codex 并回复
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 / Steps to Reproduce
      description: 提供能稳定复现问题的最小步骤
      placeholder: |
        1. 启动 CodexClaw
        2. 在 QQ 中发送 "..."
        3. 观察日志输出
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统 / Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (其他发行版)
        - Windows
        - 其他
    validations:
      required: true

  - type: dropdown
    id: sandbox
    attributes:
      label: Codex 沙盒模式 / Sandbox Mode
      options:
        - workspace-write (默认)
        - danger-full-access
        - 不确定
    validations:
      required: false

  - type: checkboxes
    id: config-section
    attributes:
      label: 相关配置段 / Related Config Section
      description: 问题可能与哪些配置段有关？
      options:
        - label: "[general] 基础配置"
        - label: "[qq] QQ 平台配置"
        - label: "[shadow] 记忆蒸馏配置"
        - label: "[scheduler] 定时任务配置"
        - label: "不确定"

  - type: textarea
    id: versions
    attributes:
      label: 版本信息 / Version Info
      description: 请贴出以下命令的输出
      render: shell
      placeholder: |
        $ rustc --version
        $ codex --version
        $ git -C ~/.codex-claw/repo rev-parse --short HEAD
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图 / Logs & Screenshots
      description: 粘贴相关日志输出或截图（注意脱敏，不要包含 AppSecret 等凭据）
      render: shell
    validations:
      required: false
