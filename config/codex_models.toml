# Canonical Codex model list, maintained alongside upstream OpenAI docs.
# Source: https://developers.openai.com/codex/models
#
# This file is embedded at compile time by codex/runtime.rs. Bump this list
# whenever OpenAI ships new Codex models so /model pickers see them without
# recompilation of the pickers themselves (just rebuild the binary).
#
# The runtime merges this canonical list with:
#   - ~/.codex/config.toml top-level `model`
#   - ~/.codex/config.toml [profiles.*] `model` values
#   - the current user's session `model_override`
# De-duplication preserves first-seen order.
#
# Each entry may carry curated aliases plus optional `description`,
# `description_zh`, and `description_en` fields. `/model` resolves aliases
# first, then falls back to a unique prefix match so short inputs stay
# convenient without broad substring matching that often becomes ambiguous.

[[models]]
name = "gpt-5.5"
aliases = ["5.5", "55"]
description_zh = "最新旗舰通用模型，整体能力优先"
description_en = "Latest flagship general-purpose model, optimized for overall capability"

[[models]]
name = "gpt-5.4"
aliases = ["5.4", "54"]
description_zh = "上一代旗舰通用模型，稳定可靠"
description_en = "Previous flagship general-purpose model with strong reliability"

[[models]]
name = "gpt-5.4-mini"
aliases = ["5.4-mini", "54m", "mini"]
description_zh = "小巧快速的通用模型"
description_en = "Compact and fast general-purpose model"

[[models]]
name = "gpt-5.3-codex"
aliases = ["5.3", "53", "codex"]
description_zh = "上一代编程能力特化的模型"
description_en = "Previous-generation programming-specialized model"

[[models]]
name = "gpt-5.3-codex-spark"
aliases = ["5.3-spark", "53s", "spark"]
description_zh = "Cerebras 加速的轻量级 Codex 模型变种"
description_en = "Cerebras-accelerated lightweight Codex model"

[[models]]
name = "gpt-5.2"
aliases = ["5.2", "52"]
description_zh = "更早一代的通用模型"
description_en = "Earlier-generation general-purpose model"
