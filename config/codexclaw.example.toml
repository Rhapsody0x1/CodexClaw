[general]
data_dir = "~/.codex-claw/data"
system_codex_home = "~/.codex"
codex_home_global = "~/.codex-claw/.codex"
default_workspace_dir = "~/.codex-claw/data/session/workspace"
codex_binary = "codex"
default_model = "gpt-5.4"
default_reasoning_effort = "medium"
self_repo_dir = "."
self_build_command = "cargo build --release"
self_binary_path = "./target/release/codex-claw"

[qq]
app_id = "YOUR_APP_ID"
app_secret = "YOUR_APP_SECRET"
api_base_url = "https://sandbox.api.sgroup.qq.com"
token_url = "https://bots.qq.com/app/getAppAccessToken"

[shadow]
# Hermes-style background distillation of memory (~/.codex-claw/data/memory/<openid>/*.md)
# and Skill (~/.codex-claw/.codex/skills/claw-*/SKILL.md). Runs silently after each turn.
enabled = true
memory_min_user_chars = 40
memory_reasoning = "low"
memory_model = ""              # empty = follow session model
memory_deadline_secs = 120
skill_files_threshold = 2
skill_tool_threshold = 5
